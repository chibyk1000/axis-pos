name: "axis pos Release Build"

on:
  push:
    tags:
      - "v*"

# Permissions required to create and write to a GitHub Release
permissions:
  contents: write

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 3️⃣ Install Node
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # Speeds up builds by caching npm packages

      # 4️⃣ Install frontend dependencies
      - name: Install dependencies
        run: npm install

      # 5️⃣ Build App and Generate Release Assets / latest.json via Tauri Action
      - name: Build and Release with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          # Injects your updater private key and its password into the build environment
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "axis pos v__VERSION__" # __VERSION__ is auto-replaced by your package.json version
          releaseBody: "Automated release for axis pos v__VERSION__"
          releaseDraft: false
          prerelease: false
          # Tells the action to create/update the updater JSON file on the release
          includeUpdaterJson: true